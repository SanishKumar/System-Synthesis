# ============================================================
# System Synthesis — Development Docker Compose
# ============================================================
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#
# This spins up the full development stack:
#   - PostgreSQL 16 (persistent data)
#   - Redis 7 (in-memory cache)
#   - Backend API (Express + Socket.io)
#   - Frontend (Next.js dev server)
#
# Environment variables can be overridden via .env file.
# ============================================================

version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ss-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ss_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ss_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-system_synthesis}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ss_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ss-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API Server ──────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: ss-server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-ss_user}:${POSTGRES_PASSWORD:-ss_dev_password}@postgres:5432/${POSTGRES_DB:-system_synthesis}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
      LOG_LEVEL: debug
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server/src:/app/server/src
      - ./shared:/app/shared
    command: npm run dev --prefix server

  # ── Frontend (Next.js Dev Server) ───────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ss-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
      NODE_ENV: development
    depends_on:
      - server
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./shared:/app/shared
    command: npm run dev --prefix frontend

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  default:
    name: system-synthesis
    driver: bridge
