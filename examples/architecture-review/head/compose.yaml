services:
  storefront:
    image: ghcr.io/example/storefront:1.4.0
    ports: ["8080:3000"]
    depends_on:
      - checkout
  checkout:
    image: ghcr.io/example/checkout:2.2.0
    ports: ["8081:3000"]
    depends_on:
      database:
        condition: service_healthy
  database:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
