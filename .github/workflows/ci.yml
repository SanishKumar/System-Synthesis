name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build --workspace=frontend
        env:
          # Dummy URL required for Next.js build time, overridden at runtime
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build architecture packages and backend
        run: npm run build --workspace=architecture-core && npm run build --workspace=architecture-cli && npm run build --workspace=architecture-action && npm run build --workspace=server

      - name: Verify committed Action bundle matches source
        run: git diff --exit-code -- architecture-action/dist

      - name: Run architecture core tests
        run: npm test --workspace=architecture-core && npm test --workspace=architecture-cli && npm test --workspace=architecture-action

      - name: Run backend, security, recovery, and convergence tests
        run: npm test --workspace=server

      - name: Run authenticated API and WebSocket integration checks
        shell: bash
        run: |
          node server/dist/index.js > server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:4000/health > /dev/null; then break; fi
            sleep 1
          done
          curl --fail http://localhost:4000/health
          node test_phases.mjs
